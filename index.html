<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Poyos — La Obra UC</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#1B3A5C;
  color:#fff;
  min-height:100vh;
  -webkit-font-smoothing:antialiased
}
.wrap{max-width:760px;margin:0 auto}
header{
  padding:14px 16px 10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.1)
}
.hdr-title{font-size:.95rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.hdr-sub{font-size:.65rem;opacity:.4;letter-spacing:.12em;margin-top:3px}
.grid-wrap{padding:16px 16px 8px}
#gc{
  position:relative;
  width:100%;
  background:rgba(255,255,255,.04);
  border-radius:12px
}
#sv{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  overflow:visible
}
.py{
  position:absolute;
  transform:translate(-50%,-50%);
  width:40px;height:40px;
  border-radius:8px;
  background:rgba(255,255,255,.1);
  border:2px solid rgba(255,255,255,.18);
  color:#fff;
  font-size:.75rem;font-weight:700;
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1px;
  transition:background .15s,border-color .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  z-index:2;
  line-height:1
}
.py:active{transform:translate(-50%,-50%) scale(.88)}
.py-sub{font-size:.44rem;opacity:.65;line-height:1;margin-top:1px}
.py.maestro{
  background:rgba(255,200,30,.18);
  border-color:rgba(255,200,30,.55);
  color:#ffc41a
}
.py.target{
  background:rgba(231,76,60,.4)!important;
  border-color:#e74c3c!important;
  color:#fff!important;
  box-shadow:0 0 0 4px rgba(231,76,60,.2)!important
}
.py.ref{
  background:rgba(230,126,34,.38)!important;
  border-color:#e67e22!important;
  color:#fff!important;
  box-shadow:0 0 0 3px rgba(230,126,34,.18)!important
}
.panel{
  margin:8px 16px 16px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:18px
}
.pn-eyebrow{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;opacity:.4;margin-bottom:3px}
.pn-title{font-size:1rem;font-weight:700;margin-bottom:16px;letter-spacing:.01em}
.ml{display:flex;flex-direction:column;gap:14px}
.mr{display:flex;align-items:center;gap:12px}
.mi{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:44px}
.minfo{flex:1;min-width:0}
.mroute{font-size:.78rem;opacity:.55;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtype{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;opacity:.38}
.mval{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;line-height:1}
.munit{font-size:.85rem;font-weight:400;opacity:.5;margin-left:1px}
.btn-cl{
  margin-top:16px;width:100%;
  padding:12px;
  background:transparent;
  border:1px solid rgba(255,255,255,.16);
  border-radius:10px;
  color:rgba(255,255,255,.6);
  font-size:.9rem;font-weight:600;
  cursor:pointer;
  transition:background .15s,color .15s;
  font-family:inherit
}
.btn-cl:hover{background:rgba(255,255,255,.08);color:#fff}
.btn-cl:active{background:rgba(255,255,255,.12)}
.hint{
  text-align:center;
  padding:20px 16px;
  font-size:.85rem;
  opacity:.28;
  letter-spacing:.01em
}
@media(min-width:480px){
  .py{width:44px;height:44px;font-size:.8rem}
  .py-sub{font-size:.48rem}
}
@media(min-width:600px){
  .grid-wrap{padding:20px 24px 8px}
  .panel{margin:8px 24px 20px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hdr-title">Calculadora de Poyos</div>
    <div class="hdr-sub">La Obra UC</div>
  </header>
  <div class="grid-wrap">
    <div id="gc">
      <svg id="sv" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  <div id="pn" class="panel" style="display:none"></div>
  <p class="hint" id="hint">Toca un poyo para ver sus medidas</p>
</div>

<script>
(function(){
  const COL_SEP = 151.4;
  const ROW_SEP = 120.9;
  const PAD = 36;
  const ROWS = ['A','B','C','D','E'];
  const COLS = [1,2,3,4,5];
  const GRID_W = 4 * COL_SEP;
  const GRID_H = 4 * ROW_SEP;

  const TRI = {
    A5:['A1','D1'], D1:['A1','A5'], D5:['A1','D1'],
    A2:['A1','D1'], A3:['A1','D1'], A4:['A1','D1'],
    B1:['A1','A5'], C1:['A1','A5'],
    D2:['D1','A1'], D3:['D1','A1'], D4:['D1','A1'],
    B5:['A5','A1'], C5:['A5','A1'],
    B2:['A1','A2'], B3:['A1','A3'], B4:['A1','A4'],
    C2:['A1','A2'], C3:['A1','A3'], C4:['A1','A4'],
    E1:['A1','A5'], E2:['E1','A1'], E3:['E1','A1'], E4:['E1','A1'], E5:['A1','E1']
  };

  const gc  = document.getElementById('gc');
  const sv  = document.getElementById('sv');
  const pn  = document.getElementById('pn');
  const hint = document.getElementById('hint');

  let scale = 1;
  let active = null;

  const allC = [];
  ROWS.forEach(r => COLS.forEach(c => allC.push(r + c)));

  function raw(coord) {
    return {
      x: (Number(coord[1]) - 1) * COL_SEP,
      y: ROWS.indexOf(coord[0]) * ROW_SEP
    };
  }

  function scr(p) {
    return { x: PAD + p.x * scale, y: PAD + p.y * scale };
  }

  function dst(a, b) {
    return Math.sqrt((b.x - a.x) ** 2 + (b.y - a.y) ** 2);
  }

  function ns(tag) {
    return document.createElementNS('http://www.w3.org/2000/svg', tag);
  }

  // Build poyo buttons
  allC.forEach(c => {
    const el = document.createElement('button');
    el.id = 'p' + c;
    el.className = 'py' + (c === 'A1' ? ' maestro' : '');
    const coord = document.createElement('span');
    coord.textContent = c;
    el.appendChild(coord);
    if (c === 'A1') {
      const sub = document.createElement('span');
      sub.className = 'py-sub';
      sub.textContent = 'Maestro';
      el.appendChild(sub);
    }
    el.addEventListener('click', () => onClick(c));
    gc.appendChild(el);
  });

  function updateLayout() {
    const cw = gc.clientWidth;
    scale = (cw - PAD * 2) / GRID_W;
    gc.style.height = (GRID_H * scale + PAD * 2) + 'px';
    allC.forEach(c => {
      const s = scr(raw(c));
      const el = document.getElementById('p' + c);
      el.style.left = s.x + 'px';
      el.style.top  = s.y + 'px';
    });
    if (active) drawTri(active);
    else drawGrid(sv);
  }

  function drawGrid(target) {
    target.innerHTML = '';
    const g = ns('g');
    g.setAttribute('opacity', '0.09');
    ROWS.forEach(r => {
      for (let c = 1; c < 5; c++) {
        addLine(g, scr(raw(r+c)), scr(raw(r+(c+1))), '#fff', 1);
      }
    });
    COLS.forEach(c => {
      for (let r = 0; r < 4; r++) {
        addLine(g, scr(raw(ROWS[r]+c)), scr(raw(ROWS[r+1]+c)), '#fff', 1);
      }
    });
    target.appendChild(g);
  }

  function addLine(parent, a, b, color, w, dash) {
    const l = ns('line');
    l.setAttribute('x1', a.x); l.setAttribute('y1', a.y);
    l.setAttribute('x2', b.x); l.setAttribute('y2', b.y);
    l.setAttribute('stroke', color);
    l.setAttribute('stroke-width', w);
    if (dash) l.setAttribute('stroke-dasharray', dash);
    parent.appendChild(l);
    return l;
  }

  function resetStyles() {
    allC.forEach(c => {
      document.getElementById('p' + c).className = 'py' + (c === 'A1' ? ' maestro' : '');
    });
  }

  function getSides(coord) {
    const refs = TRI[coord];
    const p0 = raw(coord), p1 = raw(refs[0]), p2 = raw(refs[1]);
    const d01 = dst(p0, p1), d02 = dst(p0, p2), d12 = dst(p1, p2);
    const mx = Math.max(d01, d02, d12);
    return [
      { fi:0, ti:1, lbl: coord + ' → ' + refs[0], d: d01, hyp: Math.abs(d01 - mx) < 0.01 },
      { fi:0, ti:2, lbl: coord + ' → ' + refs[1], d: d02, hyp: Math.abs(d02 - mx) < 0.01 },
      { fi:1, ti:2, lbl: refs[0] + ' → ' + refs[1], d: d12, hyp: Math.abs(d12 - mx) < 0.01 }
    ];
  }

  function drawTri(coord) {
    sv.innerHTML = '';
    drawGrid(sv);

    const refs = TRI[coord];
    const pts = [scr(raw(coord)), scr(raw(refs[0])), scr(raw(refs[1]))];

    // Filled polygon
    const poly = ns('polygon');
    poly.setAttribute('points', pts.map(p => p.x + ',' + p.y).join(' '));
    poly.setAttribute('fill', 'rgba(52,152,219,.14)');
    sv.appendChild(poly);

    // Sides and labels
    getSides(coord).forEach(s => {
      const col = s.hyp ? '#e74c3c' : '#3498db';
      const a = pts[s.fi], b = pts[s.ti];
      addLine(sv, a, b, col, 2.5, s.hyp ? '7 4' : null);
      makeLbl((a.x + b.x) / 2, (a.y + b.y) / 2, s.d.toFixed(1) + ' cm', col);
    });
  }

  function makeLbl(mx, my, txt, col) {
    const fs = 10, cw = 6.4;
    const tw = txt.length * cw + 14, th = fs + 9;
    const g = ns('g');

    const r = ns('rect');
    r.setAttribute('x', mx - tw / 2); r.setAttribute('y', my - th / 2);
    r.setAttribute('width', tw);       r.setAttribute('height', th);
    r.setAttribute('rx', 4);
    r.setAttribute('fill', '#fff');
    r.setAttribute('stroke', col); r.setAttribute('stroke-width', 1.5);
    g.appendChild(r);

    const t = ns('text');
    t.setAttribute('x', mx); t.setAttribute('y', my + fs / 2 - 0.5);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', fs);
    t.setAttribute('font-weight', 700);
    t.setAttribute('font-family', '-apple-system,BlinkMacSystemFont,sans-serif');
    t.setAttribute('fill', col);
    t.textContent = txt;
    g.appendChild(t);

    sv.appendChild(g);
  }

  function showPanel(coord) {
    const refs = TRI[coord];
    const ss = getSides(coord);
    pn.style.display = 'block';
    pn.innerHTML =
      '<div class="pn-eyebrow">Triángulo</div>' +
      '<div class="pn-title">' + coord + ' — ' + refs[0] + ' — ' + refs[1] + '</div>' +
      '<div class="ml">' +
      ss.map(s => {
        const col = s.hyp ? '#e74c3c' : '#3498db';
        const tipo = s.hyp ? 'Hipotenusa' : 'Cateto';
        return '<div class="mr">' +
          '<div class="mi" style="background:' + col + '"></div>' +
          '<div class="minfo">' +
            '<div class="mroute">' + s.lbl + '</div>' +
            '<div class="mtype">' + tipo + '</div>' +
          '</div>' +
          '<div class="mval" style="color:' + col + '">' + s.d.toFixed(1) + '<span class="munit">cm</span></div>' +
          '</div>';
      }).join('') +
      '</div>' +
      '<button class="btn-cl" onclick="__limpiar()">Limpiar</button>';
  }

  function onClick(coord) {
    resetStyles();

    if (!TRI[coord]) {
      active = null;
      drawGrid(sv);
      pn.style.display = 'none';
      hint.style.display = 'block';
      if (coord === 'A1') {
        document.getElementById('pA1').classList.add('target');
        hint.style.display = 'none';
        pn.style.display = 'block';
        pn.innerHTML =
          '<div class="pn-eyebrow">Punto Maestro</div>' +
          '<div class="pn-title">A1 — Referencia principal</div>' +
          '<p style="font-size:.85rem;opacity:.45;margin-bottom:16px">Base de todas las medidas. Sin triángulo propio.</p>' +
          '<button class="btn-cl" onclick="__limpiar()">Limpiar</button>';
      }
      return;
    }

    active = coord;
    document.getElementById('p' + coord).classList.add('target');
    TRI[coord].forEach(ref => document.getElementById('p' + ref).classList.add('ref'));
    drawTri(coord);
    showPanel(coord);
    hint.style.display = 'none';
  }

  window.__limpiar = function() {
    active = null;
    resetStyles();
    drawGrid(sv);
    pn.style.display = 'none';
    hint.style.display = 'block';
  };

  updateLayout();
  window.addEventListener('resize', updateLayout);
})();
</script>
</body>
</html>
